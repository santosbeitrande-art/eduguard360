<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduGuard Verify AI | Portal de Consultas</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #07131f, #0f2b45 45%, #1d4d78);
        color: #f4f7fb;
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 16px 40px; }
      .top { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .btn, .ghost, select {
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
      }
      .btn {
        border: 0;
        background: linear-gradient(90deg, #20c7a0, #22a8e0);
        color: #07231d;
        cursor: pointer;
      }
      .ghost {
        border: 1px solid rgba(255,255,255,.2);
        background: rgba(255,255,255,.1);
        color: #fff;
        cursor: pointer;
      }
      .lang button {
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 10px;
        padding: 8px 10px;
        color: #fff;
        background: rgba(255,255,255,.1);
        cursor: pointer;
      }
      .lang button.active { background: #0ea5e9; }
      .panel {
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
      }
      h1 { margin: 0 0 8px; }
      label { display: block; margin: 8px 0 4px; font-weight: 700; }
      input[type="file"], select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255,255,255,.2);
        background: rgba(0,0,0,.2);
        color: #fff;
      }
      .status { padding: 10px; border-radius: 10px; background: rgba(255,255,255,.08); }
      .report-block {
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 10px;
        padding: 10px;
        margin-top: 8px;
      }
      ul { margin: 6px 0 0 18px; }
      @media (max-width: 780px) { .top { flex-direction: column; align-items: stretch; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <div class="row lang">
          <button id="langPt" class="active">PT</button>
          <button id="langEn">EN</button>
          <a class="ghost" href="/">Home</a>
          <a class="ghost" href="/public/login" id="toLogin">Conta e Pagamento</a>
        </div>
        <div class="row">
          <button class="ghost" id="btnLogout">Sair</button>
        </div>
      </div>

      <section class="panel">
        <h1 id="titleMain">EduGuard Verify AI</h1>
        <p id="subtitleMain">Portal de consultas com autenticacao por email/password, fidelidade analitica e controlo de subscricao.</p>
        <div id="quotaStatus" class="status">A carregar estado da subscricao...</div>
      </section>

      <section class="panel">
        <form id="uploadForm">
          <label for="file" id="lblFile">Selecionar ficheiro</label>
          <input type="file" id="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx" />
          <button class="btn" type="submit" id="btnVerify" style="margin-top:10px;">Verificar documento</button>
        </form>
        <div id="result" class="status" style="margin-top:10px;">Pronto para consulta.</div>
      </section>

      <section class="panel">
        <h2 id="renewTitle">Renovar subscricao</h2>
        <p id="renewHint">Ao atingir a 11a consulta, selecione plano e pague para continuar.</p>
        <div class="row">
          <select id="planSelect">
            <option value="starter">Starter</option>
            <option value="business">Business</option>
            <option value="enterprise">Enterprise</option>
            <option value="annual">Annual</option>
          </select>
          <select id="providerSelect">
            <option value="mock">Mock</option>
            <option value="stripe">Stripe</option>
            <option value="flutterwave">Flutterwave</option>
            <option value="mpesa">M-Pesa</option>
          </select>
          <button type="button" class="btn" id="btnCheckout">Pagar e renovar</button>
        </div>
      </section>
    </main>

    <script>
      const API_CANDIDATES = [
        window.EDUGUARD_VERIFY_API_BASE || "",
        localStorage.getItem("eduguard_verify_api_base") || "",
        "https://api.eduguard360.co.mz",
        window.location.origin
      ].filter(Boolean);
      let API_BASE = API_CANDIDATES[0];
      const TOKEN_KEY = "eduguard_verify_access_token";
      const REFRESH_KEY = "eduguard_verify_refresh_token";
      const LANG_KEY = "eduguard_verify_lang";

      const fileInput = document.getElementById("file");
      const uploadForm = document.getElementById("uploadForm");
      const resultEl = document.getElementById("result");
      const quotaEl = document.getElementById("quotaStatus");
      const planSelect = document.getElementById("planSelect");
      const providerSelect = document.getElementById("providerSelect");

      let lang = localStorage.getItem(LANG_KEY) || "pt";

      const copy = {
        pt: {
          titleMain: "EduGuard Verify AI",
          subtitleMain: "Portal de consultas com autenticacao por email/password, fidelidade analitica e controlo de subscricao.",
          lblFile: "Selecionar ficheiro",
          btnVerify: "Verificar documento",
          renewTitle: "Renovar subscricao",
          renewHint: "Ao atingir a 11a consulta, selecione plano e pague para continuar.",
          toLogin: "Conta e Pagamento"
        },
        en: {
          titleMain: "EduGuard Verify AI",
          subtitleMain: "Verification portal with email/password authentication, high-fidelity analysis and subscription control.",
          lblFile: "Choose file",
          btnVerify: "Verify document",
          renewTitle: "Renew subscription",
          renewHint: "After the 10 free checks are consumed, select a plan and pay to continue.",
          toLogin: "Account and Billing"
        }
      };

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      async function safeJson(response) {
        try {
          return await response.json();
        } catch {
          return null;
        }
      }

      function isLikelyHtmlResponse(response) {
        const contentType = String(response?.headers?.get("content-type") || "").toLowerCase();
        return contentType.includes("text/html");
      }

      async function resolveApiBase() {
        for (const candidate of API_CANDIDATES) {
          try {
            const res = await fetch(`${candidate}/health`, { method: "GET" });
            const data = await safeJson(res);
            if (res.ok && data?.ok === true && String(data?.service || "").includes("verify-api")) {
              API_BASE = candidate;
              localStorage.setItem("eduguard_verify_api_base", API_BASE);
              return true;
            }
          } catch {}
        }
        return false;
      }

      async function api(path, options = {}) {
        const token = getToken();
        const headers = Object.assign({}, options.headers || {});
        if (token) headers.Authorization = `Bearer ${token}`;

        const candidates = [API_BASE, ...API_CANDIDATES.filter((candidate) => candidate !== API_BASE)];
        let lastError = null;

        for (const candidate of candidates) {
          try {
            const response = await fetch(`${candidate}${path}`, { ...options, headers });

            if (isLikelyHtmlResponse(response) && response.status < 500) {
              continue;
            }

            API_BASE = candidate;
            localStorage.setItem("eduguard_verify_api_base", API_BASE);
            return response;
          } catch (error) {
            lastError = error;
          }
        }

        if (lastError) throw lastError;
        throw new Error("api-unreachable");
      }

      function setResult(text) {
        resultEl.innerHTML = text;
      }

      function applyLanguage() {
        const dict = copy[lang] || copy.pt;
        Object.keys(dict).forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.textContent = dict[id];
        });
        document.getElementById("langPt").classList.toggle("active", lang === "pt");
        document.getElementById("langEn").classList.toggle("active", lang === "en");
        localStorage.setItem(LANG_KEY, lang);
      }

      function renderTrust(result) {
        const score = result?.trust?.authenticityPercentage ?? result?.summary?.authenticityScore ?? 0;
        const likelyFraud = !!result?.trust?.likelyFraud;
        const reasons = result?.trust?.fraudReasons || [];
        const indicators = result?.trust?.indicators || [];
        const ai = result?.summary?.aiLikelihood || "unknown";
        const dates = result?.summary?.dateConsistency || "unknown";

        const reasonsHtml = reasons.length
          ? `<ul>${reasons.map((r) => `<li>${r}</li>`).join("")}</ul>`
          : `<p>${lang === "pt" ? "Sem sinais fortes de fraude." : "No strong fraud signs found."}</p>`;

        const indicatorsHtml = indicators.length
          ? `<ul>${indicators.map((i) => `<li><strong>${i.code}</strong> (${i.severity}): ${i.reason}</li>`).join("")}</ul>`
          : "";

        return `
          <div class="report-block">
            <strong>${lang === "pt" ? "Percentagem de autenticidade" : "Authenticity percentage"}:</strong> ${score}%<br>
            <strong>${lang === "pt" ? "Risco de fraude" : "Fraud risk"}:</strong> ${likelyFraud ? (lang === "pt" ? "Elevado" : "High") : (lang === "pt" ? "Baixo" : "Low")}<br>
            <strong>AI:</strong> ${ai}<br>
            <strong>${lang === "pt" ? "Consistencia de datas" : "Date consistency"}:</strong> ${dates}
            <div class="report-block">
              <strong>${lang === "pt" ? "Motivos e indicios" : "Reasons and indicators"}</strong>
              ${reasonsHtml}
              ${indicatorsHtml}
            </div>
          </div>
        `;
      }

      async function loadSubscriptionStatus() {
        try {
          const res = await api("/company/subscription/status");
          const data = await safeJson(res);
          if (!res.ok) {
            quotaEl.textContent = lang === "pt" ? "Sessao invalida. Entre novamente." : "Invalid session. Please sign in again.";
            return false;
          }

          const c = data.company;
          quotaEl.textContent = `${c.name} | ${lang === "pt" ? "Consultas restantes" : "Remaining checks"}: ${c.remainingQueries} | ${lang === "pt" ? "Valido ate" : "Valid until"}: ${new Date(c.validUntil).toLocaleDateString()}`;
          return true;
        } catch {
          quotaEl.textContent = lang === "pt" ? "Falha ao carregar estado da conta." : "Failed to load account status.";
          return false;
        }
      }

      async function refreshToken() {
        const refresh = localStorage.getItem(REFRESH_KEY);
        if (!refresh) return false;
        try {
          const res = await fetch(`${API_BASE}/auth/token/refresh`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken: refresh })
          });
          const data = await safeJson(res);
          if (!res.ok) return false;
          localStorage.setItem(TOKEN_KEY, data.accessToken || "");
          if (data.refreshToken) localStorage.setItem(REFRESH_KEY, data.refreshToken);
          return true;
        } catch {
          return false;
        }
      }

      async function ensureSession() {
        if (getToken()) return true;
        const refreshed = await refreshToken();
        if (refreshed) return true;
        window.location.href = "/public/login";
        return false;
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!fileInput.files.length) {
          setResult(lang === "pt" ? "Escolha um ficheiro." : "Please choose a file.");
          return;
        }

        setResult(lang === "pt" ? "A processar consulta..." : "Processing verification...");
        const fd = new FormData();
        fd.append("file", fileInput.files[0]);

        try {
          const res = await api("/upload", { method: "POST", body: fd });
          const data = await safeJson(res);

          if (!res.ok) {
            if (data?.error === "verification-limit-reached" || data?.error === "subscription-inactive") {
              setResult((lang === "pt"
                ? "Limite gratuito atingido. Efetue pagamento para continuar consultas."
                : "Free limit reached. Complete payment to continue checks.") + " <br><a href='/public/login' style='color:#7dd3fc;'>" + (lang === "pt" ? "Ir para pagamento" : "Go to billing") + "</a>");
            } else {
              setResult((lang === "pt" ? "Erro na consulta: " : "Verification error: ") + (data?.error || "unknown"));
            }
            return;
          }

          const report = renderTrust(data.result || {});
          setResult(`<strong>${lang === "pt" ? "Consulta concluida" : "Verification completed"}</strong><br>${report}`);
          await loadSubscriptionStatus();
        } catch {
          setResult(lang === "pt" ? "Falha de ligacao ao servidor." : "Server connection failed.");
        }
      });

      document.getElementById("btnCheckout").addEventListener("click", async () => {
        setResult(lang === "pt" ? "A iniciar pagamento..." : "Starting checkout...");
        try {
          const res = await api("/company/subscription/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selectedPlan: planSelect.value,
              provider: providerSelect.value,
              currency: "USD"
            })
          });
          const data = await safeJson(res);
          if (!res.ok) {
            setResult((lang === "pt" ? "Falha no pagamento: " : "Payment failed: ") + (data?.error || "unknown"));
            return;
          }

          if (data.checkoutUrl) {
            window.location.href = data.checkoutUrl;
            return;
          }

          setResult(lang === "pt" ? "Pagamento confirmado e subscricao renovada." : "Payment confirmed and subscription renewed.");
          await loadSubscriptionStatus();
        } catch {
          setResult(lang === "pt" ? "Erro de ligacao no checkout." : "Checkout connection error.");
        }
      });

      document.getElementById("btnLogout").addEventListener("click", () => {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(REFRESH_KEY);
        window.location.href = "/public/login";
      });

      document.getElementById("langPt").addEventListener("click", () => {
        lang = "pt";
        applyLanguage();
      });

      document.getElementById("langEn").addEventListener("click", () => {
        lang = "en";
        applyLanguage();
      });

      (async () => {
        applyLanguage();
        const apiOk = await resolveApiBase();
        if (!apiOk) {
          quotaEl.textContent = lang === "pt"
            ? "API de verificacao indisponivel. Tente novamente em instantes."
            : "Verification API unavailable. Please retry in a moment.";
          return;
        }
        const ok = await ensureSession();
        if (!ok) return;
        await loadSubscriptionStatus();
      })();
    </script>
  </body>
</html>
