name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        working-directory: eduguard/verify-api
        run: npm ci
      - name: Build backend
        working-directory: eduguard/verify-api
        run: npm run build
      - name: Lint / tests placeholder
        working-directory: eduguard/verify-api
        run: npm test
