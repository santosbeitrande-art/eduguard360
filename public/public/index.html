<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>EduGuard Verify AI | Portal de Consultas</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #07131f, #0f2b45 45%, #1d4d78);
        color: #f4f7fb;
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 16px 40px; }
      .top { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .btn, .ghost, select {
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
      }
      .btn {
        border: 0;
        background: linear-gradient(90deg, #20c7a0, #22a8e0);
        color: #07231d;
        cursor: pointer;
      }
      .ghost {
        border: 1px solid rgba(255,255,255,.2);
        background: rgba(255,255,255,.1);
        color: #fff;
        cursor: pointer;
      }
      .lang button {
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 10px;
        padding: 8px 10px;
        color: #fff;
        background: rgba(255,255,255,.1);
        cursor: pointer;
      }
      .lang button.active { background: #0ea5e9; }
      .panel {
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 12px;
      }
      h1 { margin: 0 0 8px; }
      label { display: block; margin: 8px 0 4px; font-weight: 700; }
      input[type="file"], select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255,255,255,.2);
        background: rgba(0,0,0,.2);
        color: #fff;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255,255,255,.2);
        background: rgba(0,0,0,.2);
        color: #fff;
        border-radius: 10px;
        padding: 10px 12px;
        min-height: 88px;
        resize: vertical;
      }
      .status { padding: 10px; border-radius: 10px; background: rgba(255,255,255,.08); }
      .report-block {
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 10px;
        padding: 10px;
        margin-top: 8px;
      }
      .model-window {
        border: 1px solid rgba(125,211,252,.55);
        border-radius: 12px;
        padding: 12px;
        margin-top: 10px;
        background: rgba(2, 32, 56, .55);
        box-shadow: inset 0 0 0 1px rgba(14,165,233,.18);
      }
      .model-window-title {
        font-weight: 800;
        margin-bottom: 8px;
        color: #bae6fd;
      }
      .model-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 8px;
      }
      .model-chip {
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 10px;
        padding: 8px;
        background: rgba(255,255,255,.06);
      }
      .model-chip-label { font-size: .78rem; opacity: .85; }
      .model-chip-value { font-weight: 700; margin-top: 2px; }
      .experience-stage {
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255,255,255,.04);
      }
      .experience-stage-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .experience-stage-title { font-weight: 800; color: #f0f9ff; }
      .experience-badge {
        border-radius: 999px;
        padding: 2px 8px;
        font-size: .72rem;
        font-weight: 800;
      }
      .experience-badge.ok { background: rgba(16,185,129,.18); color: #a7f3d0; }
      .experience-badge.attention { background: rgba(245,158,11,.18); color: #fde68a; }
      .experience-badge.info { background: rgba(14,165,233,.18); color: #bae6fd; }
      .experience-summary { color: #dbeafe; margin: 0 0 6px; }
      .experience-details, .experience-actions { margin: 0; padding-left: 18px; }
      .experience-actions li { margin-bottom: 6px; }
      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .table-wrap { overflow: auto; border: 1px solid rgba(255,255,255,.15); border-radius: 10px; margin-top: 8px; }
      table { width: 100%; border-collapse: collapse; min-width: 760px; }
      th, td { border-bottom: 1px solid rgba(255,255,255,.12); padding: 8px; text-align: left; font-size: .9rem; }
      th { background: rgba(255,255,255,.08); }
      ul { margin: 6px 0 0 18px; }
      @media (max-width: 780px) { .top { flex-direction: column; align-items: stretch; } .two-col { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <div class="row lang">
          <button id="langPt" class="active">PT</button>
          <button id="langEn">EN</button>
          <a class="ghost" href="/">Home</a>
          <a class="ghost" href="/public/login" id="toLogin">Conta e Pagamento</a>
        </div>
        <div class="row">
          <button class="ghost" id="btnLogout">Sair</button>
        </div>
      </div>

      <section class="panel">
        <h1 id="titleMain">EduGuard Verify AI</h1>
        <p id="subtitleMain">Portal de consultas com autenticacao por email/password, fidelidade analitica e controlo de subscricao.</p>
        <div id="quotaStatus" class="status">A carregar estado da subscricao...</div>
      </section>

      <section class="panel">
        <form id="uploadForm">
          <label for="file" id="lblFile">Selecionar ficheiro</label>
          <input type="file" id="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.txt,.csv,.json,.md,.docx" />
          <button class="btn" type="submit" id="btnVerify" style="margin-top:10px;">Verificar documento</button>
        </form>
        <div id="result" class="status" style="margin-top:10px;">Pronto para consulta.</div>
      </section>

        </div>
      </section>

      <section class="panel">
        <h2 id="renewTitle">Renovar subscricao</h2>
        <p id="renewHint">Ao atingir a 11a consulta, selecione plano e pague para continuar.</p>
        <div class="row">
          <select id="planSelect">
            <option value="starter">Starter</option>
            <option value="business">Business</option>
            <option value="enterprise">Enterprise</option>
            <option value="annual">Annual</option>
          </select>
          <select id="providerSelect">
            <option value="mock">Mock</option>
            <option value="stripe">Stripe</option>
            <option value="flutterwave">Flutterwave</option>
            <option value="mpesa">M-Pesa</option>
          </select>
          <button type="button" class="btn" id="btnCheckout">Pagar e renovar</button>
        </div>
      </section>
    </main>

    <script>
      const API_CANDIDATES = Array.from(new Set([
        window.EDUGUARD_VERIFY_API_BASE || "",
        localStorage.getItem("eduguard_verify_api_base") || "",
        "https://api.eduguard360.co.mz",
        `${window.location.origin}/verify-api`,
        window.location.origin
      ]
        .filter(Boolean)
        .map((candidate) => String(candidate).replace(/\/+$/, ""))));
      let API_BASE = API_CANDIDATES[0];
      const TOKEN_KEY = "eduguard_verify_access_token";
      const REFRESH_KEY = "eduguard_verify_refresh_token";
      const LANG_KEY = "eduguard_verify_lang";
      const LOCAL_ACCOUNTS_KEY = "eduguard_verify_local_accounts";
      const LOCAL_SESSION_KEY = "eduguard_verify_local_session";
      const REQUIRED_PROCESSING_MODE = "api-external-orchestrated";

      const fileInput = document.getElementById("file");
      const uploadForm = document.getElementById("uploadForm");
      const resultEl = document.getElementById("result");
      const quotaEl = document.getElementById("quotaStatus");
      const planSelect = document.getElementById("planSelect");
      const providerSelect = document.getElementById("providerSelect");

      let lang = localStorage.getItem(LANG_KEY) || "pt";
      let offlineMode = false;

      const copy = {
        pt: {
          titleMain: "EduGuard Verify AI",
          subtitleMain: "Portal de consultas com autenticacao por email/password, fidelidade analitica e controlo de subscricao.",
          lblFile: "Selecionar ficheiro",
          btnVerify: "Verificar documento",
          renewTitle: "Renovar subscricao",
          renewHint: "Ao atingir a 11a consulta, selecione plano e pague para continuar.",
          toLogin: "Conta e Pagamento"
        },
        en: {
          titleMain: "EduGuard Verify AI",
          subtitleMain: "Verification portal with email/password authentication, high-fidelity analysis and subscription control.",
          lblFile: "Choose file",
          btnVerify: "Verify document",
          renewTitle: "Renew subscription",
          renewHint: "After the 10 free checks are consumed, select a plan and pay to continue.",
          toLogin: "Account and Billing"
        }
      };

      function getCategoryLabel(category) {
        if (String(category || "").toLowerCase() === "high-authenticity") {
          return lang === "pt" ? "Alta autenticidade" : "High authenticity";
        }
        return lang === "pt" ? "Fraude alta" : "High-risk fraud";
      }

      function getRiskLabel(value) {
        const normalized = String(value || "").toLowerCase();
        if (normalized === "high") return lang === "pt" ? "Elevado" : "High";
        if (normalized === "medium") return lang === "pt" ? "Médio" : "Medium";
        return lang === "pt" ? "Baixo" : "Low";
      }

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function normalizeEmail(email) {
        return String(email || "").trim().toLowerCase();
      }

      function getLocalSession() {
        try {
          const raw = localStorage.getItem(LOCAL_SESSION_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function readLocalAccounts() {
        try {
          const raw = localStorage.getItem(LOCAL_ACCOUNTS_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function writeLocalAccounts(accounts) {
        localStorage.setItem(LOCAL_ACCOUNTS_KEY, JSON.stringify(accounts));
      }

      function getLocalAccountFromSession() {
        const session = getLocalSession();
        if (!session?.email) return null;
        const accounts = readLocalAccounts();
        return accounts.find((account) => normalizeEmail(account.email) === normalizeEmail(session.email)) || null;
      }

      function saveLocalAccount(account) {
        const accounts = readLocalAccounts();
        const idx = accounts.findIndex((item) => normalizeEmail(item.email) === normalizeEmail(account.email));
        if (idx >= 0) {
          accounts[idx] = account;
        } else {
          accounts.push(account);
        }
        writeLocalAccounts(accounts);
      }



      async function safeJson(response) {
        try {
          return await response.json();
        } catch {
          return null;
        }
      }

      function isLikelyHtmlResponse(response) {
        const contentType = String(response?.headers?.get("content-type") || "").toLowerCase();
        return contentType.includes("text/html");
      }

      async function resolveApiBase() {
        for (const candidate of API_CANDIDATES) {
          try {
            const res = await fetch(`${candidate}/health`, { method: "GET" });
            const data = await safeJson(res);
            if (res.ok && data?.ok === true && String(data?.service || "").includes("verify-api")) {
              API_BASE = candidate;
              localStorage.setItem("eduguard_verify_api_base", API_BASE);
              return true;
            }
          } catch {}
        }
        return false;
      }

      async function api(path, options = {}) {
        const token = getToken();
        const headers = Object.assign({}, options.headers || {});
        if (token) headers.Authorization = `Bearer ${token}`;

        const candidates = [API_BASE, ...API_CANDIDATES.filter((candidate) => candidate !== API_BASE)];
        let lastError = null;

        for (const candidate of candidates) {
          try {
            const response = await fetch(`${candidate}${path}`, { ...options, headers });

            if (isLikelyHtmlResponse(response) && response.status < 500) {
              continue;
            }

            API_BASE = candidate;
            localStorage.setItem("eduguard_verify_api_base", API_BASE);
            return response;
          } catch (error) {
            lastError = error;
          }
        }

        if (lastError) throw lastError;
        throw new Error("api-unreachable");
      }

      function setResult(text) {
        resultEl.innerHTML = text;
      }

      function renderExternalModeRequiredMessage() {
        const apiHint = `<br><small>${lang === "pt" ? "Modo obrigatorio: API Externa Orquestrada." : "Required mode: External Orchestrated API."}</small>`;
        return lang === "pt"
          ? `Verificacao indisponivel sem API externa. Restabeleca ligacao ao backend para usar ${REQUIRED_PROCESSING_MODE}.${apiHint}`
          : `Verification unavailable without external API. Restore backend connectivity to use ${REQUIRED_PROCESSING_MODE}.${apiHint}`;
      }

      async function extractPdfTextInBrowser(file) {
        const empty = { text: "", pageCount: 0 };
        try {
          const module = await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs");
          const pdfjsLib = module?.default || module;
          if (!pdfjsLib?.getDocument) return empty;
          if (pdfjsLib?.GlobalWorkerOptions) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";
          }

          const raw = await file.arrayBuffer();
          const loadingTask = pdfjsLib.getDocument({ data: raw });
          const pdf = await loadingTask.promise;
          const maxPages = Math.min(Number(pdf?.numPages || 0), 10);
          const chunks = [];

          for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
            const page = await pdf.getPage(pageNumber);
            const content = await page.getTextContent();
            const pageText = (content?.items || [])
              .map((item) => String(item?.str || "").trim())
              .filter(Boolean)
              .join(" ");
            if (pageText) chunks.push(pageText);
          }

          return {
            text: chunks.join("\n").replace(/\s+/g, " ").trim(),
            pageCount: Number(pdf?.numPages || 0)
          };
        } catch {
          return empty;
        }
      }

      async function computeFileSignature(file) {
        const empty = { signature: 0, uniqueByteRatio: 0, printableRatio: 0 };
        try {
          const sample = new Uint8Array(await file.slice(0, 65536).arrayBuffer());
          if (!sample.length) return empty;

          let hash = 2166136261;
          let printable = 0;
          const unique = new Set();

          for (const byte of sample) {
            hash ^= byte;
            hash = Math.imul(hash, 16777619);
            unique.add(byte);
            if (byte >= 32 && byte <= 126) printable += 1;
          }

          return {
            signature: Math.abs(hash >>> 0),
            uniqueByteRatio: unique.size / 256,
            printableRatio: printable / sample.length
          };
        } catch {
          return empty;
        }
      }

      async function runOfflineVerification(file) {
        const localAccount = getLocalAccountFromSession();
        if (!localAccount) {
          setResult(lang === "pt" ? "Sessao local invalida. Volte ao login." : "Invalid local session. Return to login.");
          return;
        }

        if (Number(localAccount.remainingQueries || 0) <= 0) {
          setResult(lang === "pt"
            ? "Limite de 10 consultas locais atingido. Quando a API voltar, renove a subscricao."
            : "10 local checks limit reached. Renew subscription when API is back online.");
          return;
        }

        const ext = (file.name.split(".").pop() || "").toLowerCase();
        let extractedText = "";
        let pdfPageCount = 0;
        if (["txt", "csv", "json", "md"].includes(ext)) {
          try {
            extractedText = await file.text();
          } catch {
            extractedText = "";
          }
        } else if (ext === "pdf") {
          const pdfExtraction = await extractPdfTextInBrowser(file);
          extractedText = pdfExtraction.text;
          pdfPageCount = Number(pdfExtraction.pageCount || 0);
        }
        const fileSignature = await computeFileSignature(file);

        const lowerText = extractedText.toLowerCase();
        const lines = extractedText.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        const words = lowerText.split(/\s+/).map((w) => w.trim()).filter(Boolean);
        const uniqueRatio = words.length ? (new Set(words).size / words.length) : 0;
        const punctuationCount = (extractedText.match(/[.,;:!?()"'-]/g) || []).length;
        const avgWordLength = words.length ? (words.join("").length / words.length) : 0;

        const suspiciousHints = [
          "lorem ipsum", "generated by ai", "gerado por ia", "chatgpt", "template",
          "dummy", "sample", "ficticio", "fake", "forged", "modelo sem validade"
        ];
        const strongFraudHints = [
          "documento ficticio", "assinatura adulterada", "sem validade legal", "dados inventados"
        ];
        const trustHints = [
          "certificado", "declaracao", "emitido por", "ministerio", "universidade", "banco",
          "validade", "assinatura", "carimbo", "entidade"
        ];

        const matchedHints = suspiciousHints.filter((item) => lowerText.includes(item));
        const strongMatchedHints = strongFraudHints.filter((item) => lowerText.includes(item));
        const trustMatchedHints = trustHints.filter((item) => lowerText.includes(item));

        const dates = extractedText.match(/\b((?:\d{4}[-\/.]\d{1,2}[-\/.]\d{1,2})|(?:\d{1,2}[-\/.]\d{1,2}[-\/.]\d{4}))\b/g) || [];
        const emails = extractedText.match(/\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi) || [];
        const moneyValues = extractedText.match(/\b(?:MZN|MT|USD|EUR)?\s*\d{1,3}(?:[.\s]\d{3})*(?:,\d{2})?\b/gi) || [];
        const idLike = extractedText.match(/\b[A-Z]{0,2}\d{6,14}[A-Z]{0,2}\b/g) || [];
        const repeatedCharPattern = /(.)\1{6,}/.test(lowerText);
        const unsupportedExt = !["pdf", "png", "jpg", "jpeg", "webp", "bmp", "tif", "tiff", "txt", "csv", "json", "md", "docx"].includes(ext);

        const indicators = [];
        const reasons = [];
        let score = 52;

        if (unsupportedExt) {
          score -= 20;
          indicators.push({ code: "unsupported-format", severity: "high", reason: "Formato pouco confiavel para verificacao local." });
          reasons.push(lang === "pt" ? "Formato de ficheiro com baixa confianca no modo local." : "Unsupported file format for reliable local verification.");
        }

        if (file.size < 8 * 1024) {
          score -= 10;
          indicators.push({ code: "very-small-file", severity: "medium", reason: "Ficheiro muito pequeno para um documento robusto." });
          reasons.push(lang === "pt" ? "Ficheiro demasiado pequeno para uma validacao robusta." : "File is too small for robust document validation.");
        } else if (file.size > 18 * 1024 * 1024) {
          score -= 6;
          indicators.push({ code: "very-large-file", severity: "low", reason: "Ficheiro muito grande pode indicar agregado nao padronizado." });
          reasons.push(lang === "pt" ? "Tamanho de ficheiro fora do padrao habitual." : "File size outside the common range.");
        } else {
          score += 4;
        }

        if (ext === "pdf" && pdfPageCount > 0) {
          if (pdfPageCount >= 4) score += 4;
          else if (pdfPageCount === 1) score -= 1;
          indicators.push({
            code: "pdf-page-profile",
            severity: "low",
            reason: `Perfil PDF local: ${pdfPageCount} pagina(s) detetada(s).`
          });
        }

        if (fileSignature.signature) {
          const signatureDelta = (fileSignature.signature % 7) - 3;
          score += signatureDelta;
          if (fileSignature.uniqueByteRatio < 0.16) score -= 4;
          else if (fileSignature.uniqueByteRatio > 0.4) score += 2;
          if (!extractedText && fileSignature.printableRatio < 0.1) score -= 2;
        }

        if (extractedText) {
          if (words.length >= 40) score += 8;
          else if (words.length >= 18) score += 4;
          else score -= 9;

          if (uniqueRatio >= 0.45) score += 5;
          else if (uniqueRatio < 0.28) score -= 8;

          if (punctuationCount >= Math.max(6, Math.round(words.length * 0.04))) score += 2;
          else score -= 3;

          if (avgWordLength >= 4.2) score += 2;
          if (dates.length >= 1) score += 4;
          if (emails.length >= 1) score += 3;
          if (moneyValues.length >= 1) score += 3;
          if (idLike.length >= 1) score += 4;
          if (trustMatchedHints.length >= 2) score += 5;
          if (lines.length >= 6) score += 2;
        } else if (["txt", "csv", "json", "md"].includes(ext)) {
          score -= 18;
          indicators.push({ code: "empty-text-content", severity: "high", reason: "Conteudo textual vazio apos leitura local." });
          reasons.push(lang === "pt" ? "Conteudo textual vazio no documento." : "Textual content is empty after local extraction.");
        } else if (ext === "pdf") {
          score -= 6;
          indicators.push({ code: "pdf-no-text-layer", severity: "medium", reason: "PDF sem camada de texto legivel no navegador." });
          reasons.push(lang === "pt"
            ? "PDF sem texto extraivel localmente; resultado depende de sinais estruturais."
            : "PDF without extractable text locally; result depends on structural signals.");
        }

        if (matchedHints.length > 0) {
          score -= Math.min(30, matchedHints.length * 8);
          matchedHints.forEach((hint) => {
            indicators.push({ code: "suspicious-pattern", severity: "medium", reason: `Padrao suspeito encontrado: ${hint}` });
          });
          reasons.push(...matchedHints.map((hint) => `Padrao suspeito detectado: ${hint}`));
        }

        if (strongMatchedHints.length > 0) {
          score -= Math.min(25, strongMatchedHints.length * 12);
          strongMatchedHints.forEach((hint) => {
            indicators.push({ code: "strong-fraud-pattern", severity: "high", reason: `Sinal forte de fraude textual: ${hint}` });
          });
          reasons.push(...strongMatchedHints.map((hint) => `Sinal forte de risco: ${hint}`));
        }

        if (repeatedCharPattern) {
          score -= 8;
          indicators.push({ code: "character-repetition", severity: "medium", reason: "Repeticao anormal de caracteres no texto." });
          reasons.push(lang === "pt" ? "Repeticao anormal de caracteres no documento." : "Abnormal character repetition detected.");
        }

        const currentYear = new Date().getFullYear();
        const parsedYears = dates
          .map((d) => {
            const p = d.match(/\d{4}/);
            return p ? Number(p[0]) : null;
          })
          .filter((value) => Number.isFinite(value));
        let dateConsistency = "unknown";
        if (parsedYears.length) {
          const invalidYear = parsedYears.some((year) => Number(year) < 1990 || Number(year) > currentYear + 2);
          dateConsistency = invalidYear ? "inconsistent" : "consistent";
          if (dateConsistency === "consistent") score += 4;
          else {
            score -= 9;
            indicators.push({ code: "date-inconsistency", severity: "high", reason: "Datas fora da janela esperada para documentos validos." });
            reasons.push(lang === "pt" ? "Datas inconsistentes encontradas no documento." : "Inconsistent dates found in document.");
          }
        }

        let aiLikelihood = "unknown";
        if (words.length >= 20) {
          const aiSignals = matchedHints.length + (uniqueRatio < 0.32 ? 1 : 0) + (repeatedCharPattern ? 1 : 0);
          aiLikelihood = aiSignals >= 3 ? "likely-ai" : aiSignals >= 1 ? "possible-ai" : "unlikely-ai";
          if (aiLikelihood === "likely-ai") {
            score -= 10;
            indicators.push({ code: "ai-likelihood", severity: "medium", reason: "Padrao textual fortemente associado a geracao automatica." });
            reasons.push(lang === "pt" ? "Padrao de texto com forte indicio de geracao automatica." : "Text pattern strongly suggests automated generation.");
          } else if (aiLikelihood === "possible-ai") {
            score -= 4;
          }
        }

        score = Math.max(8, Math.min(98, Math.round(score)));
        const highCount = indicators.filter((item) => item.severity === "high").length;
        const mediumCount = indicators.filter((item) => item.severity === "medium").length;
        const likelyFraud = highCount > 0 || score < 50 || mediumCount >= 3;

        const result = {
          processingMode: "local-heuristic-v3",
          summary: {
            authenticityScore: score,
            aiLikelihood,
            dateConsistency
          },
          trust: {
            authenticityPercentage: score,
            likelyFraud,
            riskScore: Math.max(0, Math.min(100, 100 - score + mediumCount * 6 + highCount * 12)),
            confidence: Math.max(35, Math.min(95, 55 + indicators.length * 5)),
            fraudReasons: reasons.length > 0
              ? reasons
              : [lang === "pt" ? "Documento com sinais locais de consistencia." : "Document has local consistency signals."],
            indicators
          }
        };

        localAccount.remainingQueries = Math.max(0, Number(localAccount.remainingQueries || 0) - 1);
        localAccount.lastCheckAt = new Date().toISOString();
        saveLocalAccount(localAccount);

        const report = renderTrust(result);
        setResult(`<strong>${lang === "pt" ? "Consulta local concluida" : "Local verification completed"}</strong><br>${report}`);
        await loadSubscriptionStatus();
      }

      function applyLanguage() {
        const dict = copy[lang] || copy.pt;
        Object.keys(dict).forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          if (el.tagName === "INPUT") {
            el.placeholder = dict[id];
          } else {
            el.textContent = dict[id];
          }
        });
        document.getElementById("langPt").classList.toggle("active", lang === "pt");
        document.getElementById("langEn").classList.toggle("active", lang === "en");
        localStorage.setItem(LANG_KEY, lang);
      }



      function formatExperienceStatus(status) {
        if (status === "ok") return lang === "pt" ? "OK" : "OK";
        if (status === "attention") return lang === "pt" ? "Atencao" : "Attention";
        return lang === "pt" ? "Info" : "Info";
      }

      function buildFallbackExperience(result) {
        const score = result?.trust?.authenticityPercentage ?? result?.summary?.authenticityScore ?? 0;
        const likelyFraud = !!result?.trust?.likelyFraud;
        const riskScore = result?.trust?.riskScore ?? result?.riskScore ?? Math.max(0, Math.min(100, 100 - Number(score || 0)));
        const confidence = result?.trust?.confidence ?? result?.confidence ?? Math.max(40, Math.min(95, 58 + (result?.trust?.indicators || []).length * 4));
        const ai = result?.summary?.aiLikelihood || "unknown";
        const dates = result?.summary?.dateConsistency || "unknown";
        const processingMode = result?.processingMode || REQUIRED_PROCESSING_MODE;
        const decision = result?.finalDecision || (likelyFraud ? "revisao_manual" : "motor_interno");
        const hasAttention = likelyFraud || (result?.trust?.indicators || []).some((item) => item?.severity === "high");

        return {
          summary: hasAttention
            ? (lang === "pt" ? "Analise concluida com sinais que exigem atencao antes da aprovacao." : "Analysis completed with signals that require attention before approval.")
            : (lang === "pt" ? "Analise concluida com sinais suficientes de consistencia." : "Analysis completed with sufficient consistency signals."),
          decisionTitle: hasAttention
            ? (lang === "pt" ? "Atencao requerida" : "Attention required")
            : (lang === "pt" ? "Documento consistente" : "Document looks consistent"),
          stages: [
            {
              title: "Understanding",
              status: "ok",
              summary: lang === "pt" ? `O documento foi classificado no modo ${processingMode}.` : `The document was classified in ${processingMode} mode.`,
              details: [`${lang === "pt" ? "Autenticidade" : "Authenticity"} ${score}%`, `${lang === "pt" ? "Risco" : "Risk"} ${riskScore}/100`]
            },
            {
              title: "Cross-validation",
              status: hasAttention ? "attention" : "ok",
              summary: lang === "pt" ? "Foram avaliados sinais de IA, datas, estrutura e indicadores de risco." : "AI signals, dates, structure, and risk indicators were evaluated.",
              details: [`AI ${ai}`, `${lang === "pt" ? "Datas" : "Dates"} ${dates}`]
            },
            {
              title: "Verdict",
              status: hasAttention ? "attention" : "ok",
              summary: lang === "pt" ? `Decisao atual: ${decision}.` : `Current decision: ${decision}.`,
              details: [`${lang === "pt" ? "Confianca" : "Confidence"} ${confidence}%`]
            }
          ],
          actions: hasAttention
            ? [{ title: lang === "pt" ? "Enviar para revisao manual" : "Send to manual review", description: lang === "pt" ? "Confirmar com operador antes de aprovar o documento." : "Confirm with an operator before approving the document." }]
            : [{ title: lang === "pt" ? "Continuar workflow" : "Continue workflow", description: lang === "pt" ? "Atualizar CRM, gerar relatorio e arquivar o documento." : "Update CRM, generate report, and archive the document." }]
        };
      }

      function renderExperience(experience) {
        const stages = Array.isArray(experience?.stages) ? experience.stages : [];
        const actions = Array.isArray(experience?.actions) ? experience.actions : [];
        const stagesHtml = stages.map((stage) => `
          <div class="experience-stage">
            <div class="experience-stage-head">
              <div class="experience-stage-title">${stage.title}</div>
              <span class="experience-badge ${stage.status || "info"}">${formatExperienceStatus(stage.status)}</span>
            </div>
            <p class="experience-summary">${stage.summary || ""}</p>
            ${(stage.details || []).length ? `<ul class="experience-details">${stage.details.map((item) => `<li>${item}</li>`).join("")}</ul>` : ""}
          </div>
        `).join("");
        const actionsHtml = actions.length
          ? `<ul class="experience-actions">${actions.map((action) => `<li><strong>${action.title}</strong>: ${action.description}</li>`).join("")}</ul>`
          : "";
        return `
          <div class="model-window">
            <div class="model-window-title">${lang === "pt" ? "Resposta inteligente da verificacao" : "Smart verification response"}</div>
            <p class="experience-summary"><strong>${experience?.decisionTitle || ""}</strong><br>${experience?.summary || ""}</p>
            <div class="model-grid">${stagesHtml}</div>
            ${actionsHtml ? `<div class="report-block"><strong>${lang === "pt" ? "Proximas acoes" : "Next actions"}</strong>${actionsHtml}</div>` : ""}
          </div>
        `;
      }

      function renderTrust(result) {
        const score = result?.trust?.authenticityPercentage ?? result?.summary?.authenticityScore ?? 0;
        const likelyFraud = !!result?.trust?.likelyFraud;
        const reasons = result?.trust?.fraudReasons || [];
        const indicators = result?.trust?.indicators || [];
        const ai = result?.summary?.aiLikelihood || "unknown";
        const dates = result?.summary?.dateConsistency || "unknown";
        const riskScore = result?.trust?.riskScore ?? result?.riskScore ?? Math.max(0, Math.min(100, 100 - Number(score || 0)));
        const confidence = result?.trust?.confidence ?? result?.confidence ?? Math.max(40, Math.min(95, 58 + indicators.length * 4));
        const processingMode = result?.processingMode || REQUIRED_PROCESSING_MODE;
        const experience = result?.experience || buildFallbackExperience(result);

        const reasonsHtml = reasons.length
          ? `<ul>${reasons.map((r) => `<li>${r}</li>`).join("")}</ul>`
          : `<p>${lang === "pt" ? "Sem sinais fortes de fraude." : "No strong fraud signs found."}</p>`;

        const indicatorsHtml = indicators.length
          ? `<ul>${indicators.map((i) => `<li><strong>${i.code}</strong> (${i.severity}): ${i.reason}</li>`).join("")}</ul>`
          : "";

        return `
          <div class="report-block">
            <strong>${lang === "pt" ? "Percentagem de autenticidade" : "Authenticity percentage"}:</strong> ${score}%<br>
            <strong>${lang === "pt" ? "Risco de fraude" : "Fraud risk"}:</strong> ${likelyFraud ? (lang === "pt" ? "Elevado" : "High") : (lang === "pt" ? "Baixo" : "Low")}<br>
            <strong>${lang === "pt" ? "Pontuacao de risco" : "Risk score"}:</strong> ${riskScore}/100<br>
            <strong>${lang === "pt" ? "Confianca" : "Confidence"}:</strong> ${confidence}%<br>
            <strong>${lang === "pt" ? "Modo de processamento" : "Processing mode"}:</strong> ${processingMode}<br>
            <strong>AI:</strong> ${ai}<br>
            <strong>${lang === "pt" ? "Consistencia de datas" : "Date consistency"}:</strong> ${dates}
            <div class="model-window">
              <div class="model-window-title">${lang === "pt" ? "Novo modelo de avaliacao" : "New evaluation model"}</div>
              <div class="model-grid">
                <div class="model-chip">
                  <div class="model-chip-label">${lang === "pt" ? "Decisao" : "Decision"}</div>
                  <div class="model-chip-value">${likelyFraud ? (lang === "pt" ? "Revisao manual" : "Manual review") : (lang === "pt" ? "Aprovado" : "Approved")}</div>
                </div>
                <div class="model-chip">
                  <div class="model-chip-label">${lang === "pt" ? "Risco" : "Risk"}</div>
                  <div class="model-chip-value">${riskScore}/100</div>
                </div>
                <div class="model-chip">
                  <div class="model-chip-label">${lang === "pt" ? "Confianca" : "Confidence"}</div>
                  <div class="model-chip-value">${confidence}%</div>
                </div>
                <div class="model-chip">
                  <div class="model-chip-label">${lang === "pt" ? "Modo" : "Mode"}</div>
                  <div class="model-chip-value">${processingMode}</div>
                </div>
              </div>
            </div>
            ${renderExperience(experience)}
            <div class="report-block">
              <strong>${lang === "pt" ? "Motivos e indicios" : "Reasons and indicators"}</strong>
              ${reasonsHtml}
              ${indicatorsHtml}
            </div>
          </div>
        `;
      }

      async function loadSubscriptionStatus() {
        if (offlineMode) {
          const localAccount = getLocalAccountFromSession();
          if (!localAccount) {
            quotaEl.textContent = lang === "pt" ? "Sessao local invalida. Volte ao login." : "Invalid local session. Return to login.";
            return false;
          }
          quotaEl.textContent = `${localAccount.companyName || localAccount.fullName || localAccount.email} | ${lang === "pt" ? "Consultas restantes" : "Remaining checks"}: ${Number(localAccount.remainingQueries || 0)} | ${lang === "pt" ? "Valido ate" : "Valid until"}: ${new Date(localAccount.validUntil).toLocaleDateString()} | ${lang === "pt" ? "modo local" : "local mode"}`;
          return true;
        }

        try {
          const res = await api("/company/subscription/status");
          const data = await safeJson(res);
          if (!res.ok) {
            quotaEl.textContent = lang === "pt" ? "Sessao invalida. Entre novamente." : "Invalid session. Please sign in again.";
            return false;
          }

          const c = data.company;
          quotaEl.textContent = `${c.name} | ${lang === "pt" ? "Consultas restantes" : "Remaining checks"}: ${c.remainingQueries} | ${lang === "pt" ? "Valido ate" : "Valid until"}: ${new Date(c.validUntil).toLocaleDateString()}`;
          return true;
        } catch {
          quotaEl.textContent = lang === "pt" ? "Falha ao carregar estado da conta." : "Failed to load account status.";
          return false;
        }
      }

      async function refreshToken() {
        const refresh = localStorage.getItem(REFRESH_KEY);
        if (!refresh) return false;
        try {
          const res = await fetch(`${API_BASE}/auth/token/refresh`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken: refresh })
          });
          const data = await safeJson(res);
          if (!res.ok) return false;
          localStorage.setItem(TOKEN_KEY, data.accessToken || "");
          if (data.refreshToken) localStorage.setItem(REFRESH_KEY, data.refreshToken);
          return true;
        } catch {
          return false;
        }
      }

      async function ensureSession() {
        if (getToken()) return true;
        const refreshed = await refreshToken();
        if (refreshed) return true;

        const localSession = getLocalSession();
        if (localSession?.email && getLocalAccountFromSession()) {
          offlineMode = true;
          return true;
        }

        window.location.href = "/public/login";
        return false;
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!fileInput.files.length) {
          setResult(lang === "pt" ? "Escolha um ficheiro." : "Please choose a file.");
          return;
        }
        if (offlineMode) {
          const apiRecovered = await resolveApiBase();
          if (!apiRecovered) {
            setResult(renderExternalModeRequiredMessage());
            return;
          }
          offlineMode = false;
          if (!getToken()) {
            window.location.href = "/public/login";
            return;
          }
          await loadSubscriptionStatus();
        }

        setResult(lang === "pt" ? "A processar consulta..." : "Processing verification...");
        const fd = new FormData();
        fd.append("file", fileInput.files[0]);

        try {
          const res = await api("/upload", {
            method: "POST",
            body: fd,
            headers: {
              "x-eduguard-required-processing-mode": REQUIRED_PROCESSING_MODE
            }
          });
          const data = await safeJson(res);

          if (!res.ok) {
            if (data?.error === "verification-limit-reached" || data?.error === "subscription-inactive") {
              setResult((lang === "pt"
                ? "Limite gratuito atingido. Efetue pagamento para continuar consultas."
                : "Free limit reached. Complete payment to continue checks.") + " <br><a href='/public/login' style='color:#7dd3fc;'>" + (lang === "pt" ? "Ir para pagamento" : "Go to billing") + "</a>");
            } else if (data?.error === "external-validation-required") {
              setResult(renderExternalModeRequiredMessage());
            } else {
              setResult((lang === "pt" ? "Erro na consulta: " : "Verification error: ") + (data?.error || "unknown"));
            }
            return;
          }

          const report = renderTrust(data.result || {});
          setResult(`<strong>${lang === "pt" ? "Consulta concluida" : "Verification completed"}</strong><br>${report}`);
          await loadSubscriptionStatus();
        } catch {
          setResult(lang === "pt" ? "Falha de ligacao ao servidor." : "Server connection failed.");
        }
      });

      document.getElementById("btnCheckout").addEventListener("click", async () => {
        if (offlineMode) {
          setResult(lang === "pt"
            ? "Pagamento indisponivel no modo local. Assim que API estiver online, renove a subscricao."
            : "Payment unavailable in local mode. Renew subscription once API is online.");
          return;
        }
        setResult(lang === "pt" ? "A iniciar pagamento..." : "Starting checkout...");
        try {
          const res = await api("/company/subscription/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selectedPlan: planSelect.value,
              provider: providerSelect.value,
              currency: "USD"
            })
          });
          const data = await safeJson(res);
          if (!res.ok) {
            setResult((lang === "pt" ? "Falha no pagamento: " : "Payment failed: ") + (data?.error || "unknown"));
            return;
          }

          if (data.checkoutUrl) {
            window.location.href = data.checkoutUrl;
            return;
          }

          setResult(lang === "pt" ? "Pagamento confirmado e subscricao renovada." : "Payment confirmed and subscription renewed.");
          await loadSubscriptionStatus();
        } catch {
          setResult(lang === "pt" ? "Erro de ligacao no checkout." : "Checkout connection error.");
        }
      });

      document.getElementById("btnLogout").addEventListener("click", () => {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(REFRESH_KEY);
        localStorage.removeItem(LOCAL_SESSION_KEY);
        window.location.href = "/public/login";
      });

      document.getElementById("langPt").addEventListener("click", () => {
        lang = "pt";
        applyLanguage();
      });

      document.getElementById("langEn").addEventListener("click", () => {
        lang = "en";
        applyLanguage();
      });

      (async () => {
        applyLanguage();
        const apiOk = await resolveApiBase();
        if (!apiOk) {
          offlineMode = true;
          quotaEl.textContent = lang === "pt"
            ? "API de verificacao indisponivel. A consulta requer API Externa Orquestrada."
            : "Verification API unavailable. Checks require External Orchestrated API.";
        }
        const ok = await ensureSession();
        if (!ok) return;
        await loadSubscriptionStatus();
      })();
    </script>
  </body>
</html>
